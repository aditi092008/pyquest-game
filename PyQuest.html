// ---------- Simple icon components (emoji-based, no external icon lib needed) ----------
function Icon({ children, size = 16, color, style = {} }) {
  return <span style={{ fontSize: size, color, lineHeight: 1, display: "inline-block", ...style }}>{children}</span>;
}
const Check = (p) => <Icon {...p}>✓</Icon>;
const X = (p) => <Icon {...p}>✕</Icon>;
const Zap = (p) => <Icon {...p}>⚡</Icon>;
const Trophy = (p) => <Icon {...p}>🏆</Icon>;
const ChevronRight = (p) => <Icon {...p}>›</Icon>;

    color: "#34D399",
    concept: "Har chhota text-game (jaise number-guessing ya rock-paper-scissors) sirf 3 cheezon se banta hai: while loop (game chalta rahe), random (unpredictability), aur if/else (rules check karna). Chalo dekhte hain kaise!",
    questions: [
      { q: "Ek simple game loop banane ke liye kaunsa loop best hai jab tak player haare/jeete?", type: "mcq", options: ["for i in range(1)", "while True", "if True", "loop()"], answer: 1, exp: "'while True' game ko tab tak chalata rehta hai jab tak andar se koi break condition (jeetna/haarna) na aaye — isse 'game loop' kehte hain." },
      { q: "import random\nsecret = random.randint(1, 10)\nguess = 7\nif guess == secret:\n    print(\"You win!\")\nelse:\n    print(\"Try again\")", type: "predict", options: ["Hamesha 'You win!'", "'You win!' ya 'Try again' — secret pe depend karta hai", "Error", "Hamesha 'Try again'"], answer: 1, exp: "secret random hai, isliye result depend karega ki guess (7) secret ke barabar hai ya nahi — yehi guessing game ka core logic hai." },
      { q: "score = 0\ndef add_point():\n    global score\n    score += 1\n\nadd_point()\nadd_point()\nprint(score)", type: "predict", options: ["0", "1", "2", "Error"], answer: 2, exp: "'global score' function ko outer score variable change karne deta hai. Do baar call hone se score 0→1→2 ho gaya — yeh scoring system ka basic idea hai." },
      { q: "moves = [\"rock\", \"paper\", \"scissors\"]\nplayer = \"rock\"\ncomputer = random.choice(moves)\nif player == computer:\n    print(\"Draw\")", type: "predict", options: ["Hamesha Draw print hoga", "Draw sirf tab print hoga jab computer bhi 'rock' choose kare", "Error", "Kabhi print nahi hoga"], answer: 1, exp: "computer random choose karta hai — Draw sirf tab hoga jab dono ka choice match kare, jo Rock-Paper-Scissors ka rule hai." },
      { q: "lives = 3\nwhile lives > 0:\n    lives -= 1\nprint(\"Game Over\")", type: "predict", options: ["Infinite loop, kabhi print nahi hoga", "'Game Over' print hoga jab lives 0 ho jaye", "Error", "Turant print hoga"], answer: 1, exp: "Har iteration mein lives ek-ek karke kam hoti hai (3→2→1→0), jab condition False ho jaati hai loop ruk jaata hai aur 'Game Over' print hota hai — health/lives system ka basic pattern." },
      { q: "Player ka input lene ke liye (jaise unka move) kaunsa function use hota hai?", type: "mcq", options: ["input()", "get()", "read()", "prompt()"], answer: 0, exp: "input() user se text type karwa kar leta hai — jaise game mein player se move puchna." },
      { q: "high_score = 0\nnew_score = 85\nif new_score > high_score:\n    high_score = new_score\nprint(high_score)", type: "predict", options: ["0", "85", "Error", "None"], answer: 1, exp: "Yeh 'high score update' ka classic pattern hai — agar naya score purane se zyada hai, to update kar do. 85 > 0, isliye high_score = 85." },
    ],
  },
];

const MASCOT_MSGS_CORRECT = ["Badhiya! 🎉", "Ekdum sahi!", "Shabaash Aditi!", "Perfect!", "Wah, on point!"];
const MASCOT_MSGS_WRONG = ["Koi baat nahi, aage badho", "Close tha! Explanation dekho", "Yeh tricky tha, samajh lo", "Practice se ho jayega"];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ---------- Bonus interactive: Guess the Number game ----------
function GuessGame({ color, onBack }) {
  const secretRef = useRef(Math.floor(Math.random() * 20) + 1);
  const [guess, setGuess] = useState("");
  const [tries, setTries] = useState(0);
  const [log, setLog] = useState([]);
  const [won, setWon] = useState(false);
  const [showCode, setShowCode] = useState(false);

  function submitGuess() {
    const g = parseInt(guess, 10);
    if (isNaN(g)) return;
    const t = tries + 1;
    setTries(t);
    if (g === secretRef.current) {
      setLog((l) => [`✅ ${g} — Sahi! ${t} tries mein mila.`, ...l]);
      setWon(true);
    } else if (g < secretRef.current) {
      setLog((l) => [`🔼 ${g} — thoda upar socho`, ...l]);
    } else {
      setLog((l) => [`🔽 ${g} — thoda neeche socho`, ...l]);
    }
    setGuess("");
  }

  function reset() {
    secretRef.current = Math.floor(Math.random() * 20) + 1;
    setTries(0);
    setLog([]);
    setWon(false);
    setGuess("");
  }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: "#6B7280", fontSize: 13, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace" }}>&larr; topics</button>
        <button onClick={() => setShowCode((s) => !s)} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "1px solid #2a2c42", borderRadius: 8, padding: "5px 10px", color: "#9698b0", fontSize: 12, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace" }}>
          <Code2 size={13} /> {showCode ? "Hide" : "Show"} Python code
        </button>
      </div>

      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 34 }}>🎯</div>
        <div style={{ fontWeight: 700, fontSize: 18 }}>Guess the Number</div>
        <div style={{ fontSize: 13, color: "#9698b0" }}>Maine 1 se 20 ke beech ek number socha hai</div>
      </div>

      {showCode && (
        <div style={{ background: "#0f1019", border: "1px solid #2a2c42", borderRadius: 12, padding: 14, marginBottom: 14, fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, color: "#9698b0", whiteSpace: "pre-wrap", lineHeight: 1.6 }}>
{`import random
secret = random.randint(1, 20)
tries = 0

while True:
    guess = int(input("Guess: "))
    tries += 1
    if guess == secret:
        print(f"Correct in {tries} tries!")
        break
    elif guess < secret:
        print("Go higher")
    else:
        print("Go lower")`}
        </div>
      )}

      {!won ? (
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <input
            type="number"
            value={guess}
            onChange={(e) => setGuess(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && submitGuess()}
            placeholder="Apna guess likho..."
            style={{ flex: 1, background: "#181927", border: "1px solid #2a2c42", borderRadius: 10, padding: "11px 14px", color: "#E8E8F0", fontSize: 14, fontFamily: "'JetBrains Mono', monospace" }}
          />
          <button onClick={submitGuess} style={{ background: color, border: "none", borderRadius: 10, padding: "0 18px", color: "#12131f", fontWeight: 700, cursor: "pointer" }}>Go</button>
        </div>
      ) : (
        <button onClick={reset} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, background: color, border: "none", borderRadius: 10, padding: "12px 0", color: "#12131f", fontWeight: 700, cursor: "pointer", marginBottom: 14, fontFamily: "'Space Grotesk', sans-serif" }}>
          <RotateCcw size={15} /> Phir se khelo
        </button>
      )}

      <div style={{ fontSize: 12, color: "#6B7280", marginBottom: 8, fontFamily: "'JetBrains Mono', monospace" }}>Tries: {tries}</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 220, overflowY: "auto" }}>
        {log.map((l, i) => (
          <div key={i} style={{ background: "#181927", border: "1px solid #2a2c42", borderRadius: 8, padding: "8px 12px", fontSize: 13, fontFamily: "'JetBrains Mono', monospace" }}>{l}</div>
        ))}
      </div>
    </div>
  );
}

function PyQuest() {
  const [screen, setScreen] = useState("home"); // home | intro | quiz | result | game
  const [topicIdx, setTopicIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [xp, setXp] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [sessionCorrect, setSessionCorrect] = useState(0);
  const [completedTopics, setCompletedTopics] = useState({});

  const topic = TOPICS[topicIdx];
  const question = topic?.questions[qIdx];

  function openIntro(idx) {
    setTopicIdx(idx);
    setScreen("intro");
  }

  function startTopic() {
    setQIdx(0);
    setSelected(null);
    setRevealed(false);
    setSessionCorrect(0);
    setScreen("quiz");
  }

  function selectAnswer(i) {
    if (revealed) return;
    setSelected(i);
    setRevealed(true);
    if (i === question.answer) {
      setXp((x) => x + 10);
      setStreak((s) => {
        const ns = s + 1;
        setBestStreak((b) => Math.max(b, ns));
        return ns;
      });
      setSessionCorrect((c) => c + 1);
    } else {
      setStreak(0);
    }
  }

  function next() {
    if (qIdx + 1 < topic.questions.length) {
      setQIdx(qIdx + 1);
      setSelected(null);
      setRevealed(false);
    } else {
      setCompletedTopics((c) => ({ ...c, [topic.id]: true }));
      setScreen("result");
    }
  }

  const isCorrect = revealed && selected === question?.answer;

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(180deg,#12131f 0%,#1a1b2e 100%)",
      color: "#E8E8F0",
      fontFamily: "'Space Grotesk', 'Segoe UI', sans-serif",
      display: "flex",
      justifyContent: "center",
      padding: "20px 14px",
    }}>
      <div style={{ width: "100%", maxWidth: 480 }}>

        {/* Top bar */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{
              width: 34, height: 34, borderRadius: 10, background: "#FFD43B",
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18,
            }}>🐍</div>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 17, letterSpacing: -0.5 }}>PyQuest</span>
          </div>
          <div style={{ display: "flex", gap: 10, fontFamily: "'JetBrains Mono', monospace", fontSize: 13 }}>
            <span style={{ display: "flex", alignItems: "center", gap: 3, color: "#FFD43B" }}><Zap size={14} /> {xp}</span>
            <span style={{ display: "flex", alignItems: "center", gap: 3, color: "#FB7185" }}><Flame size={14} /> {streak}</span>
          </div>
        </div>

        {screen === "home" && (
          <div>
            <div style={{
              background: "#181927", border: "1px solid #2a2c42", borderRadius: 14,
              padding: "16px 16px", marginBottom: 16, fontFamily: "'JetBrains Mono', monospace", fontSize: 13, lineHeight: 1.6,
            }}>
              <div style={{ color: "#6B7280" }}>&gt;&gt;&gt; welcome(<span style={{ color: "#FFD43B" }}>"Aditi"</span>)</div>
              <div style={{ color: "#4ADE80" }}>14 topics, sabse basics se lekar apna game-logic tak. Chuno aur shuru ho jao!</div>
            </div>

            <button
              onClick={() => setScreen("game")}
              style={{
                display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%",
                background: "linear-gradient(135deg,#1c2e26,#141d2f)", border: "1px solid #34D399",
                borderRadius: 12, padding: "14px 16px", cursor: "pointer", textAlign: "left",
                color: "#E8E8F0", marginBottom: 16,
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <Gamepad2 size={20} color="#34D399" />
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>Play: Guess the Number</div>
                  <div style={{ fontSize: 12, color: "#6B7280", fontFamily: "'JetBrains Mono', monospace" }}>Bonus — interactive mini game + code</div>
                </div>
              </div>
              <ChevronRight size={18} color="#34D399" />
            </button>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {TOPICS.map((t, i) => (
                <button
                  key={t.id}
                  onClick={() => openIntro(i)}
                  style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    background: "#181927", border: `1px solid ${completedTopics[t.id] ? t.color : "#2a2c42"}`,
                    borderRadius: 12, padding: "14px 16px", cursor: "pointer", textAlign: "left",
                    color: "#E8E8F0", transition: "border-color .15s",
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ width: 8, height: 8, borderRadius: 4, background: t.color }} />
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 15 }}>{t.name}</div>
                      <div style={{ fontSize: 12, color: "#6B7280", fontFamily: "'JetBrains Mono', monospace" }}>
                        {t.questions.length} questions {completedTopics[t.id] ? "· done ✓" : ""}
                      </div>
                    </div>
                  </div>
                  <ChevronRight size={18} color="#6B7280" />
                </button>
              ))}
            </div>

            {bestStreak > 2 && (
              <div style={{ marginTop: 18, textAlign: "center", fontSize: 12, color: "#6B7280", fontFamily: "'JetBrains Mono', monospace" }}>
                <Trophy size={13} style={{ verticalAlign: -2, marginRight: 4 }} color="#FFD43B" />
                Best streak: {bestStreak}
              </div>
            )}
          </div>
        )}

        {screen === "game" && <GuessGame color="#34D399" onBack={() => setScreen("home")} />}

        {screen === "intro" && topic && (
          <div>
            <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: "#6B7280", fontSize: 13, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace", marginBottom: 16 }}>&larr; topics</button>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <BookOpen size={20} color={topic.color} />
              <div style={{ fontWeight: 700, fontSize: 19 }}>{topic.name}</div>
            </div>
            <div style={{
              background: "#181927", border: `1px solid ${topic.color}55`, borderRadius: 14,
              padding: 16, marginBottom: 20, fontSize: 14, lineHeight: 1.7, color: "#c8c9dc",
            }}>
              {topic.concept}
            </div>
            <button
              onClick={startTopic}
              style={{
                width: "100%", background: topic.color, border: "none", borderRadius: 12,
                padding: "13px 0", fontWeight: 700, fontSize: 15, color: "#12131f", cursor: "pointer",
                fontFamily: "'Space Grotesk', sans-serif",
              }}
            >
              Start Practice — {topic.questions.length} questions
            </button>
          </div>
        )}

        {screen === "quiz" && question && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: "#6B7280", fontSize: 13, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace" }}>&larr; topics</button>
              <span style={{ fontSize: 12, color: "#6B7280", fontFamily: "'JetBrains Mono', monospace" }}>{qIdx + 1} / {topic.questions.length}</span>
            </div>

            <div style={{ height: 5, background: "#242640", borderRadius: 3, marginBottom: 18, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${((qIdx + (revealed?1:0)) / topic.questions.length) * 100}%`, background: topic.color, transition: "width .3s" }} />
            </div>

            <div style={{
              background: "#0f1019", border: "1px solid #2a2c42", borderRadius: 14,
              padding: 16, marginBottom: 16, fontFamily: "'JetBrains Mono', monospace",
              fontSize: 14, whiteSpace: "pre-wrap", lineHeight: 1.6,
            }}>
              <div style={{ color: "#6B7280", fontSize: 11, marginBottom: 8, display: "flex", alignItems: "center", gap: 5 }}>
                <Terminal size={12} /> {question.type === "predict" ? "output kya hoga?" : "sahi jawab chuno"}
              </div>
              <span style={{ color: "#E8E8F0" }}>{question.q}</span>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
              {question.options.map((opt, i) => {
                let bg = "#181927", border = "#2a2c42", txt = "#E8E8F0";
                if (revealed) {
                  if (i === question.answer) { bg = "#14251c"; border = "#4ADE80"; txt = "#4ADE80"; }
                  else if (i === selected) { bg = "#2a1418"; border = "#FB7185"; txt = "#FB7185"; }
                  else { txt = "#4b4d63"; }
                }
                return (
                  <button
                    key={i}
                    onClick={() => selectAnswer(i)}
                    disabled={revealed}
                    style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      background: bg, border: `1px solid ${border}`, borderRadius: 10,
                      padding: "12px 14px", fontFamily: "'JetBrains Mono', monospace", fontSize: 13.5,
                      color: txt, textAlign: "left", cursor: revealed ? "default" : "pointer",
                    }}
                  >
                    {opt}
                    {revealed && i === question.answer && <Check size={16} />}
                    {revealed && i === selected && i !== question.answer && <X size={16} />}
                  </button>
                );
              })}
            </div>

            {revealed && (
              <div style={{
                marginTop: 16, background: isCorrect ? "#14251c" : "#181927",
                border: `1px solid ${isCorrect ? "#4ADE80" : "#2a2c42"}`, borderRadius: 12, padding: 14,
              }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 5, color: isCorrect ? "#4ADE80" : "#FB7185" }}>
                  {isCorrect ? pick(MASCOT_MSGS_CORRECT) : pick(MASCOT_MSGS_WRONG)}
                </div>
                <div style={{ fontSize: 13, color: "#9698b0", lineHeight: 1.5 }}>{question.exp}</div>
                <button
                  onClick={next}
                  style={{
                    marginTop: 12, width: "100%", background: topic.color, border: "none",
                    borderRadius: 10, padding: "11px 0", fontWeight: 700, fontSize: 14,
                    color: "#12131f", cursor: "pointer", fontFamily: "'Space Grotesk', sans-serif",
                  }}
                >
                  {qIdx + 1 < topic.questions.length ? "Next Question" : "Finish"}
                </button>
              </div>
            )}
          </div>
        )}

        {screen === "result" && (
          <div style={{ textAlign: "center", paddingTop: 30 }}>
            <div style={{ fontSize: 44, marginBottom: 8 }}>{sessionCorrect === topic.questions.length ? "🏆" : "🐍"}</div>
            <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>{topic.name} complete!</div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 14, color: "#9698b0", marginBottom: 24 }}>
              {sessionCorrect} / {topic.questions.length} correct · +{sessionCorrect * 10} XP
            </div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button
                onClick={startTopic}
                style={{
                  display: "flex", alignItems: "center", gap: 6, background: "#181927",
                  border: "1px solid #2a2c42", borderRadius: 10, padding: "11px 18px",
                  color: "#E8E8F0", cursor: "pointer", fontFamily: "'Space Grotesk', sans-serif", fontSize: 14,
                }}
              ><RotateCcw size={15} /> Retry</button>
              <button
                onClick={() => setScreen("home")}
                style={{
                  background: topic.color, border: "none", borderRadius: 10, padding: "11px 18px",
                  color: "#12131f", fontWeight: 700, cursor: "pointer", fontFamily: "'Space Grotesk', sans-serif", fontSize: 14,
                }}
              >More Topics</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PyQuest />);
</script>
</body>
</html>
